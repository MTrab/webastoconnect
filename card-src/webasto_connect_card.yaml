# 1) Add this resource in Home Assistant:
# URL: /local/webastoconnect/webasto-connect-card.js
# Type: module
#
# 2) Assets are auto-installed by the integration on load/update.
#    Manual copy (optional):
#    mkdir -p config/www/webastoconnect
#    cp custom_components/webastoconnect/card/webasto-connect-card.js config/www/webastoconnect/webasto-connect-card.js
#
# 3) Use this card config:

type: custom:webasto-connect-card
main_output_entity: switch.<your_main_output_entity>
ventilation_mode_entity: switch.<your_ventilation_mode_entity>
end_time_entity: sensor.<your_end_time_entity>
temperature_entity: sensor.<your_temperature_entity>
battery_entity: sensor.<your_battery_entity>
location_entity: sensor.<your_geocoded_location_entity_or_device_tracker>

# Optional labels:
# title_geo_fence: Geo-fence
# title_mode: Modus
# title_timers: Timere
# title_map: Kort
