name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  COMPONENT_DIR: webastoconnect

jobs:
  release_zip_file:
    name: Prepare release asset
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Update manifest.json version to ${{ github.event.release.tag_name }}
        run: |
          python3 ${{ github.workspace }}/.github/scripts/update_hacs_manifest.py --version ${{ github.event.release.tag_name }} --path /custom_components/webastoconnect/
      - name: Build Webasto Connect Card
        run: |
          cd card-src
          npm ci
          npm run build
      - name: Commit manifest and card build update
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ./custom_components/webastoconnect/manifest.json ./custom_components/webastoconnect/card/webasto-connect-card.js
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "release: update manifest and card build"
          git push origin HEAD:main
      - name: Create zip
        run: |
          cd custom_components/webastoconnect
          zip webastoconnect.zip -r ./
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@2.11.4
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./custom_components/webastoconnect/webastoconnect.zip
          asset_name: webastoconnect.zip
          tag: ${{ github.ref }}
          overwrite: true
