name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to package, for example v1.1.0
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

env:
  COMPONENT_DIR: webastoconnect
  RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  release_zip_file:
    name: Prepare release asset
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Validate release tag
        run: |
          if [ -z "${{ env.RELEASE_TAG }}" ]; then
            echo "::error::Missing release tag. Provide workflow_dispatch input 'tag_name' or publish a GitHub release."
            exit 1
          fi
      - name: Validate release automation token
        env:
          RELEASE_WORKFLOW_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          if [ -z "$RELEASE_WORKFLOW_TOKEN" ]; then
            echo "::error::Missing secret RELEASE_WORKFLOW_TOKEN. Configure a PAT (repo scope) so required checks can run on the manifest PR."
            exit 1
          fi
      - name: Update manifest.json version to ${{ env.RELEASE_TAG }}
        run: |
          python3 ${{ github.workspace }}/.github/scripts/update_hacs_manifest.py --version ${{ env.RELEASE_TAG }} --path /custom_components/webastoconnect/
      - name: Build Webasto Connect Card
        run: |
          cd card-src
          npm install
          npm run build
      - name: Create pull request for manifest update
        id: create_manifest_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
          branch-token: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
          base: main
          add-paths: |
            ./custom_components/webastoconnect/manifest.json
            ./custom_components/webastoconnect/card/webasto-connect-card.js
          commit-message: "release: update manifest and card build for ${{ env.RELEASE_TAG }}"
          branch: "chore/release-manifest-${{ env.RELEASE_TAG }}"
          title: "release: update manifest for ${{ env.RELEASE_TAG }}"
          body: |
            Automated manifest and bundled card update for `${{ env.RELEASE_TAG }}`.
          labels: |
            skip-changelog
      - name: Verify gh is available
        run: |
          gh --version
      - name: Wait for manifest PR checks and merge
        id: wait_manifest_pr_merge
        if: ${{ steps.create_manifest_pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_manifest_pr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          max_attempts=80
          sleep_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            if gh pr checks "$pr_number" --repo "$repo" --required; then
              gh pr merge "$pr_number" --repo "$repo" --squash --delete-branch
              merge_sha="$(gh pr view "$pr_number" --repo "$repo" --json mergeCommit -q '.mergeCommit.oid')"
              echo "merge_sha=$merge_sha" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep "$sleep_seconds"
          done

          echo "Timed out waiting for required checks on manifest PR #$pr_number."
          exit 1
      - name: Checkout merged commit
        if: ${{ steps.wait_manifest_pr_merge.outputs.merge_sha != '' }}
        run: |
          git fetch origin main
          git checkout --force "${{ steps.wait_manifest_pr_merge.outputs.merge_sha }}"
      - name: Create zip
        run: |
          cd custom_components/webastoconnect
          zip webastoconnect.zip -r ./
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./custom_components/webastoconnect/webastoconnect.zip
          asset_name: webastoconnect.zip
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
