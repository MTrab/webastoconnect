name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    name: Lint + Tests (Python 3.14)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build card bundle
        run: |
          cd card-src
          npm install
          npm run build

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: python -m pytest -q tests
