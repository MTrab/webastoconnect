create_timer:
  name: Create timer
  description: Create a new simple heater timer for a Webasto device.
  fields:
    device_id:
      name: Device
      description: Vælg Webasto-enhed.
      required: true
      selector:
        device:
          integration: webastoconnect
    line:
      name: Output line
      description: Timer line to modify.
      required: false
      default: heater
      selector:
        select:
          options:
            - heater
            - ventilation
    start_time:
      name: Start time
      description: Local clock time for timer start.
      required: true
      selector:
        time:
    duration_minutes:
      name: Duration
      description: Duration in minutes.
      required: true
      selector:
        number:
          min: 1
          max: 1440
          mode: box
    repeat:
      name: Repeat bitmask
      description: Weekday bitmask used by Webasto API.
      required: true
      selector:
        number:
          min: 0
          max: 127
          mode: box
    enabled:
      name: Enabled
      description: Whether timer is enabled.
      required: false
      default: true
      selector:
        boolean:
    latitude:
      name: Latitude
      description: Optional latitude. If set, longitude must also be set.
      required: false
      selector:
        text:
    longitude:
      name: Longitude
      description: Optional longitude. If set, latitude must also be set.
      required: false
      selector:
        text:

update_timer:
  name: Update timer
  description: >-
    Update an existing simple timer by index. Only fields provided in the action
    are changed; omitted fields keep their current value.
  fields:
    device_id:
      name: Device
      description: Vælg Webasto-enhed.
      required: true
      selector:
        device:
          integration: webastoconnect
    line:
      name: Output line
      description: Timer line to modify.
      required: false
      default: heater
      selector:
        select:
          options:
            - heater
            - ventilation
    timer_index:
      name: Timer index
      description: Zero-based timer index in current timer list.
      required: true
      selector:
        number:
          min: 0
          mode: box
    start_time:
      name: Start time
      description: Local clock time for timer start.
      required: false
      selector:
        time:
    duration_minutes:
      name: Duration
      description: Duration in minutes.
      required: false
      selector:
        number:
          min: 1
          max: 1440
          mode: box
    repeat:
      name: Repeat bitmask
      description: Weekday bitmask used by Webasto API.
      required: false
      selector:
        number:
          min: 0
          max: 127
          mode: box
    enabled:
      name: Enabled
      description: Whether timer is enabled.
      required: false
      selector:
        boolean:
    latitude:
      name: Latitude
      description: Optional latitude. If set, longitude must also be set.
      required: false
      selector:
        text:
    longitude:
      name: Longitude
      description: Optional longitude. If set, latitude must also be set.
      required: false
      selector:
        text:

